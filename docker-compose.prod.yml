# Production stack: Next.js app + Postgres + Garage S3.
# All services run in HOST network mode — they reach each other via 127.0.0.1.
# Operator MUST firewall ports 5000, 5432, 3900-3903 from public.
# Only Nginx (manual on host) should expose 80/443.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecommerce-website:latest
    container_name: ecommerce-app
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env.production
    depends_on:
      - postgres
      - garage

  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=127.0.0.1"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=30"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 10

  garage:
    image: dxflrs/garage:v1.0.1
    container_name: ecommerce-garage
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./docker/garage/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml

volumes:
  postgres_data:
  garage_meta:
  garage_data:
